flutter_launcher_icons:
  image_path: "assets/app_icon.png"

  android: "launcher_icon"
  image_path_android: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "assets/app_icon.png"
  adaptive_icon_foreground: "assets/app_icon.png"

  ios: true
  image_path_ios: "assets/app_icon.png"
  remove_alpha_channel_ios: true

  web:
    generate: true
    image_path: "assets/app_icon.png"
    background_color: "#1C1C1E"
    theme_color: "#1C1C1E"

  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 48

  macos:
    generate: true
    image_path: "assets/app_icon.png"
